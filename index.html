thead th{position:sticky;top:0;background:#1e3a5f;color:#fff;padding:6px 8px;text-align:left;z-index:2;font-size:10px}
td{padding:4px 7px;border-bottom:1px solid #f1f5f9}

.cc{background:#ecfdf5!important}
.wn{background:#fee2e2!important;color:#991b1b;font-weight:600}
.inf{background:#dbeafe!important;color:#1e40af}
.actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center}

<h2>Processing Options</h2>
<div className="grid3">
<div><label>Hazleton Day Divide</label><select value={op.hazletonDayDivideHour} onChange={e=>setOp({...op,hazletonDayDivideHour:+e.target.value})}><option value={0}>Midnight (00:00)</option><option value={5}>5:00 AM</option><option value={6}>6:00 AM</option><option value={7}>7:00 AM</option><option value={23}>11:00 PM</option></select></div>
<div><label>Neenah Shift Type</label><select value={op.neenahShiftType} onChange={e=>setOp({...op,neenahShiftType:e.target.value})}><option value="auto">Auto-detect (from hours)</option><option value="8hr">Force 8hr (majority_hours)</option><option value="12hr">Force 12hr (scheduled_in)</option></select></div>
<div><label>Batavia Pay Group</label><select value={op.bataviaPayGroup} onChange={e=>setOp({...op,bataviaPayGroup:e.target.value})}><option value="24x7">24x7 (Sun-Sat)</option><option value="24x5">24x5 (Mon-Sun)</option></select></div>
</div>
<div className="actions">
<button className="btn btn-blue" onClick={run}>Run Calculations</button>
{res&&<button className="btn btn-green" onClick={dl}>Download CSV</button>}
{res&&<button className="btn btn-gray" onClick={()=>setAll(!all)}>{all?"Key Columns":"All Columns"}</button>}
</div>
</div>}

{stats&&<div className="grid6" style={{marginBottom:16}}>
{[["Rows",stats.total,"#2563eb"],["Processed",stats.proc,"#16a34a"],["Skipped",stats.skip,"#94a3b8"],["Venues",stats.vs.length,"#7c3aed"],["Total Wages","$"+Number(stats.tw).toLocaleString(),"#059669"],["Warnings",stats.wn,stats.wn>0?"#dc2626":"#16a34a"]].map(([l,v,c])=>
<div key={l} className="stat" style={{borderLeft:`3px solid ${c}`}}><div className="lbl">{l}</div><div className="val" style={{color:c}}>{v}</div></div>)}
</div>}

{res&&<div className="card" style={{padding:0,overflow:"hidden"}}>
<div style={{display:"flex",borderBottom:"1px solid #e2e8f0"}}>
<div className={`tab${tab==="calc"?" active":""}`} onClick={()=>setTab("calc")} style={{padding:"10px 20px",cursor:"pointer",fontWeight:600,fontSize:13,borderBottom:tab==="calc"?"2px solid #2563eb":"2px solid transparent",color:tab==="calc"?"#1e3a5f":"#94a3b8"}}>Calculated Results</div>
<div className={`tab${tab==="venue"?" active":""}`} onClick={()=>setTab("venue")} style={{padding:"10px 20px",cursor:"pointer",fontWeight:600,fontSize:13,borderBottom:tab==="venue"?"2px solid #2563eb":"2px solid transparent",color:tab==="venue"?"#1e3a5f":"#94a3b8"}}>Venue Reference</div>
</div>
{tab==="calc"&&<div className="tw"><table><thead><tr>{dc.map(c=><th key={c}>{c}</th>)}</tr></thead><tbody>
{dr.map((r,i)=><tr key={i}>{dc.map(c=>{const v=r[c],s=String(v||"");let cl=CC.includes(c)?"cc":"";if(s.includes("WARNING"))cl="wn";else if(s.includes("INFO"))cl="inf";return<td key={c} className={cl}>{s}</td>})}</tr>)}
</tbody></table></div>}
{tab==="venue"&&<div className="tw" style={{maxHeight:500}}><table><thead><tr><th>Venue</th><th>Week Start</th><th>Hour Method</th><th>Sun OT</th><th>Sat Prem</th><th>Unpaid Lunch</th></tr></thead><tbody>
{Object.entries(VC).sort(([a],[b])=>a.localeCompare(b)).map(([n,c])=><tr key={n}><td style={{fontWeight:600}}>{n}</td><td><span className={`badge ${c.w==="Sunday"?"bb":"ba"}`}>{c.w}</span></td><td>{c.hm}{n==="Neenah"?" (dynamic)":""}</td><td className={c.so?"wn":""}>{c.so?"YES":"No"}</td><td className={c.sp?"wn":""}>{c.sp?c.sp+"x":"-"}</td><td className={c.ul?"wn":""}>{c.ul?"YES":"-"}</td></tr>)}
</tbody></table></div>}
{tab==="calc"&&<div style={{padding:"8px 16px",fontSize:11,color:"#94a3b8",borderTop:"1px solid #f1f5f9"}}>{dr.length} rows, {dc.length} columns {all?"(all)":"(key)"}</div>}
</div>}

{!res&&!raw&&<div className="card" style={{textAlign:"center",padding:40}}>
<h2 style={{fontSize:20,marginBottom:8}}>Get Started</h2>
<p style={{color:"#64748b",maxWidth:500,margin:"0 auto"}}>Upload a timesheet CSV to run the 10-stage invoice calculation pipeline. Configure Hazleton, Neenah, and Batavia options before processing. Download results as CSV when done.</p>
<div style={{marginTop:20,display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
{["36 Venues","Daily OT >8hrs","Weekly OT >40hrs","Sunday/Saturday Premiums","Midnight Split","Tax Calculations"].map(t=><span key={t} className="badge bb">{t}</span>)}
</div>
</div>}

<div className="foot">Amcor Invoice Calculation Engine v2 | 158/158 tests passed | 36 venues configured | 10-stage pipeline</div>
</div>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
